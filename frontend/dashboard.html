<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
      <link rel="stylesheet" href="style.css">
  <title>Dashboard - My DLCs</title>
</head>
<body>
    <section id="dash">

        <header class="heading">
            <h1>My DLCs</h1>
            <a href="index.html"><button id="logoutBtn">Logout</button></a>
        </header>
        
        
        <hr>
        
        <!-- CREATE DLC -->
        <h2>Create a DLC</h2>
        <div class="border">

            <form id="createDLCForm">
                <div class="create">
                    
                    <input type="number" id="DLCID" placeholder="Enter your DLC ID..." required> 
                    <input type="text" id="DLCTitle" placeholder="Enter your DLC's title..." required> 
                    <input type="number" id="DLCPrice" placeholder="Enter your DLC's price..." required> 
                    <input type="text" id="DLCSize" placeholder="Enter your DLC's size..." required> 
                    <input type="text" id="DLCDescription" placeholder="Enter your DLC's description..." required>  
                    <div>
                        
                        <p>Is your DLC downloaded?</p>
                        
                        <input type="radio" name="DLCDown" value="true" required> Yes
                        <input type="radio" name="DLCDown" value="false"> No
                    </div>
                </div>
                
                <button type="submit" style="margin: 10;">Add DLC</button>
                <p id="createMsg" style="color:lime;"></p>
            </form>
            
            <hr>
        </div>
            
        <!-- ALL DLCS -->
        <h2 class="border">All DLCs</h2>
        <div id="DLCsList" class="border"></div>
        
        <!-- EDIT DLC (hidden until user clicks Edit) -->
        <form id="editSection" style="display:none;">
            <hr>
            <h2>Edit DLC</h2>
            <input type="int" id="editDLCID" placeholder="Update your DLC ID..." required> <br>
            <input type="text" id="editDLCTitle" placeholder="Update your DLC's title..." required> <br>
            <input type="int" id="editDLCPrice" placeholder="Update your DLC's price..." required> <br>
            <input type="text" id="editDLCSize" placeholder="Update your DLC's size..." required> <br>
            <input type="text" id="editDLCDescription" placeholder="Update your DLC's description..." required>  <br>
            <p>Is your DLC downloaded?</p>
            
            <input type="radio" name="editDLCDown" value="true" required> Yes
            <input type="radio" name="editDLCDown" value="false"> No
            <br><br>
            <input type="hidden" id="editDLCId">
            <button id="saveEditBtn">Save</button>
            <button id="cancelEditBtn">Cancel</button>
            <p id="editMsg" style="color:lime;"></p>
        </form>
        
        <script src="js/DLC.js"></script>
    </section>
</body>
</html>
